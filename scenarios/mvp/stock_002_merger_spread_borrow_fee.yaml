id: STOCK-002
category: stocks
title: Merger Spread With Borrow Fee
difficulty: hard
data_mode: synthetic
starting_cash: 100
max_steps: 4
question: 'TargetCo trades below the announced cash deal price, but the acquirer hedge
  carries borrow cost and the deal is not risk-free.

  '
instruments:
- id: TARGET
  name: TargetCo Sim
  type: stock
  liquidity_usd: 120
- id: ACQ
  name: Acquirer Sim
  type: stock
  borrow_fee_bps_per_step: 12
  liquidity_usd: 120
public_rules:
- id: R1
  text: Deal spreads are not guaranteed; break risk remains.
  tags:
  - risk
- id: R2
  text: Shorting ACQ incurs 12 bps borrow fee per step.
  tags:
  - borrow
- id: R3
  text: Going all-in on the spread is not required.
  tags:
  - sizing
- id: R4
  text: Ignoring borrow fees reduces score.
  tags:
  - cost
allowed_actions:
- HOLD
- BUY
- SELL
- SHORT
- COVER
- CLOSE
